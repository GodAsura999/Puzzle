<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fināla puzle</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: #0f1b2d;
      --panel-2: #12233a;
      --border: #243853;
      --accent: #4fd1ff;
      --accent-2: #31d0aa;
      --text: #eaf4ff;
      --muted: #9bb0c7;
      --success: #31d0aa;
      --warning: #f3b84b;
      --danger: #ff6b81;
      --slot-size: 180px;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(79, 209, 255, 0.12), transparent 25%),
        radial-gradient(circle at bottom right, rgba(49, 208, 170, 0.08), transparent 30%),
        linear-gradient(135deg, #06101d, #0a1527);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
    }

    .panel {
      background: rgba(15, 27, 45, 0.96);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      margin-bottom: 16px;
      align-items: center;
    }

    .title {
      margin: 0;
      font-size: 28px;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      min-width: 120px;
      background: #0a1424;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      text-align: center;
    }

    .stat small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .stat strong {
      font-size: 18px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #091321;
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 209, 255, 0.12);
    }

    button {
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s ease;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8be3ff);
      color: #04131d;
    }

    .btn-secondary {
      background: #19283f;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .message {
      min-height: 22px;
      margin: 6px 0 14px;
      font-weight: 700;
    }

    .message.success { color: var(--success); }
    .message.warning { color: var(--warning); }
    .message.error { color: var(--danger); }

    .progress-wrap {
      margin-bottom: 18px;
    }

    .progress {
      width: 100%;
      height: 12px;
      background: #091321;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.2s ease;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
      align-items: start;
    }

    .small-title {
      margin: 0 0 12px;
      font-size: 17px;
    }

    .tray {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      min-height: 220px;
      align-content: start;
    }

    .piece {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #324763;
      background: #091321;
      box-shadow: 0 6px 18px rgba(0,0,0,0.22);
      cursor: grab;
      user-select: none;
    }

    .piece.hidden {
      display: none;
    }

    .piece.selected {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(140px, var(--slot-size)));
      gap: 12px;
      justify-content: center;
    }

    .slot {
      position: relative;
      background:
        linear-gradient(180deg, rgba(16, 29, 49, 0.94), rgba(9, 19, 33, 0.98));
      border: 1px dashed #50647f;
      border-radius: 14px;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      transition: 0.15s ease;
      padding: 12px;
    }

    .slot:hover {
      border-color: var(--accent);
      transform: scale(1.01);
    }

    .slot.drag-over {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 2px rgba(79, 209, 255, 0.22);
    }

    .slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    .slot-number {
      position: absolute;
      top: 8px;
      left: 10px;
      font-size: 12px;
      color: var(--muted);
      z-index: 4;
      pointer-events: none;
      background: rgba(6, 16, 29, 0.7);
      padding: 2px 6px;
      border-radius: 999px;
    }

    .slot-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18px 14px 14px;
      background:
        radial-gradient(circle at top, rgba(79, 209, 255, 0.10), transparent 45%),
        linear-gradient(180deg, rgba(18, 35, 58, 0.92), rgba(9, 19, 33, 0.96));
    }

    .slot.filled .slot-overlay {
      display: none;
    }

    .slot-overlay-content {
      max-width: 100%;
    }

    .slot-overlay h4 {
      margin: 0 0 8px;
      font-size: 15px;
      line-height: 1.3;
      color: var(--accent);
    }

    .slot-overlay p {
      margin: 0;
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
      white-space: pre-line;
    }

    .fullscreen {
      position: fixed;
      inset: 0;
      background: rgba(3, 8, 18, 0.98);
      z-index: 9999;
      display: none;
      padding: 24px;
    }

    .fullscreen.show {
      display: block;
    }

    .fullscreen-inner {
      width: 100%;
      height: calc(100vh - 48px);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .viewer {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .viewer img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 14px;
      border: 1px solid #324763;
      box-shadow: 0 18px 50px rgba(0,0,0,0.45);
      background: #091321;
    }

    .viewer-placeholder {
      color: var(--muted);
      text-align: center;
      font-size: 20px;
    }

    .modal-close {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 2;
    }

    .final-modal {
      position: fixed;
      inset: 0;
      background: rgba(3, 8, 18, 0.88);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 20px;
    }

    .final-modal.show {
      display: flex;
    }

    .final-box {
      width: 100%;
      max-width: 460px;
      background: #101d31;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      text-align: center;
    }

    .final-box h2 {
      margin-top: 0;
    }

    @media (max-width: 1200px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 980px) {
      .topbar,
      .controls {
        grid-template-columns: 1fr;
      }

      .stats {
        justify-content: flex-start;
      }

      .board {
        grid-template-columns: repeat(2, minmax(140px, 1fr));
      }
    }

    @media (max-width: 620px) {
      .board {
        grid-template-columns: 1fr;
      }

      .fullscreen {
        padding: 12px;
      }

      .fullscreen-inner {
        height: calc(100vh - 24px);
      }
    }
  </style>
</head>

<script>
(function () {
  function blockAction() {
    alert("Developer tools are not allowed on this page.");
    location.reload();
  }

  document.addEventListener("contextmenu", e => {
    e.preventDefault();
    blockAction();
  });

  document.addEventListener("keydown", e => {
    if (
      e.key === "F12" ||
      (e.ctrlKey && e.shiftKey && ["I", "J", "C"].includes(e.key)) ||
      (e.ctrlKey && e.key === "u") ||
      (e.ctrlKey && e.key === "U")
    ) {
      e.preventDefault();
      blockAction();
    }
  });

  const threshold = 160;
  setInterval(() => {
    if (
      window.outerWidth - window.innerWidth > threshold ||
      window.outerHeight - window.innerHeight > threshold
    ) {
      blockAction();
    }
  }, 500);

  setInterval(() => {
    debugger;
  }, 100);
})();
</script>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="panel">
        <h1 class="title">Fināla puzle</h1>
      </div>

      <div class="stats">
        <div class="stat">
          <small>Laiks</small>
          <strong id="timerText">00:00:00</strong>
        </div>
        <div class="stat">
          <small>Atbloķēti</small>
          <strong id="unlockedCount">0/9</strong>
        </div>
        <div class="stat">
          <small>Ievietoti</small>
          <strong id="placedCount">0/9</strong>
        </div>
      </div>
    </div>

    <div class="controls">
      <input id="codeInput" type="text" placeholder="Ievadi kodu" autocomplete="off" />
      <button class="btn-primary" id="unlockBtn">Atbloķēt</button>
      <button class="btn-secondary" id="clearSelectionBtn">Noņemt izvēli</button>
    </div>

    <div id="message" class="message"></div>

    <div class="progress-wrap panel">
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <div class="layout">
      <div class="panel">
        <h3 class="small-title">Gabali</h3>
        <div class="tray" id="piecesTray">
          <img src="piece1.jpg" id="piece1" class="piece hidden" draggable="true" alt="Gabals 1">
          <img src="piece2.jpg" id="piece2" class="piece hidden" draggable="true" alt="Gabals 2">
          <img src="piece3.jpg" id="piece3" class="piece hidden" draggable="true" alt="Gabals 3">
          <img src="piece4.jpg" id="piece4" class="piece hidden" draggable="true" alt="Gabals 4">
          <img src="piece5.jpg" id="piece5" class="piece hidden" draggable="true" alt="Gabals 5">
          <img src="piece6.jpg" id="piece6" class="piece hidden" draggable="true" alt="Gabals 6">
          <img src="piece7.jpg" id="piece7" class="piece hidden" draggable="true" alt="Gabals 7">
          <img src="piece8.jpg" id="piece8" class="piece hidden" draggable="true" alt="Gabals 8">
          <img src="piece9.jpg" id="piece9" class="piece hidden" draggable="true" alt="Gabals 9">
        </div>
      </div>

      <div class="panel">
        <h3 class="small-title">Laukums</h3>
        <div class="board" id="board">
          <div class="slot" data-correct="piece1" data-piece="piece1">
            <span class="slot-number">1</span>
            <div class="slot-overlay"><div class="slot-overlay-content"></div></div>
          </div>
          <div class="slot" data-correct="piece2" data-piece="piece2">
            <span class="slot-number">2</span>
            <div class="slot-overlay"><div class="slot-overlay-content"></div></div>
          </div>
          <div class="slot" data-correct="piece3" data-piece="piece3">
            <span class="slot-number">3</span>
            <div class="slot-overlay"><div class="slot-overlay-content"></div></div>
          </div>
          <div class="slot" data-correct="piece4" data-piece="piece4">
            <span class="slot-number">4</span>
            <div class="slot-overlay"><div class="slot-overlay-content"></div></div>
          </div>
          <div class="slot" data-correct="piece5" data-piece="piece5">
            <span class="slot-number">5</span>
            <div class="slot-overlay"><div class="slot-overlay-content"></div></div>
          </div>
          <div class="slot" data-correct="piece6" data-piece="piece6">
            <span class="slot-number">6</span>
            <div class="slot-overlay"><div class="slot-overlay-content"></div></div>
          </div>
          <div class="slot" data-correct="piece7" data-piece="piece7">
            <span class="slot-number">7</span>
            <div class="slot-overlay"><div class="slot-overlay-content"></div></div>
          </div>
          <div class="slot" data-correct="piece8" data-piece="piece8">
            <span class="slot-number">8</span>
            <div class="slot-overlay"><div class="slot-overlay-content"></div></div>
          </div>
          <div class="slot" data-correct="piece9" data-piece="piece9">
            <span class="slot-number">9</span>
            <div class="slot-overlay"><div class="slot-overlay-content"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="fullscreen" id="slotModal">
    <div class="fullscreen-inner">
      <div class="viewer">
        <button class="btn-secondary modal-close" id="closeModalBtn">Aizvērt</button>
        <img id="modalImage" src="" alt="" style="display:none;">
        <div class="viewer-placeholder" id="modalPlaceholder">Gabals vēl nav ievietots</div>
      </div>
    </div>
  </div>

  <div class="final-modal" id="winModal">
    <div class="final-box">
      <h2>Puzle salikta</h2>
      <p>Laiks: <strong id="finalTime">00:00:00</strong></p>
      <button class="btn-primary" id="closeWinBtn">Aizvērt</button>
    </div>
  </div>

  <script>
    const HINT_TIMES = [60, 120];

    const codes = {
      "CODE1": "piece1",
      "b1nary": "piece2",
      "ch@os": "piece3",
      "SALDUS123": "piece4",
      "FESTIVALS": "piece5",
      "F6": "piece6",
      "G7": "piece7",
      "H8": "piece8",
      "CODE9": "piece9"
    };

    const hints = {
      piece1: {
        title: "1. uzdevums",
        description: "Izpildi pirmo uzdevumu un atrodi pareizo kodu, lai atbloķētu pirmo puzles gabalu.",
        h1: "Vieglākais hints 1. uzdevumam",
        h2: "Vidējais hints 1. uzdevumam"
      },
      piece2: {
        title: "2. uzdevums",
        description: "Šajā uzdevumā jāatšifrē binārs saturs, lai iegūtu atslēgu gabalam.",
        h1: "Paskaties uz bināro formātu",
        h2: "Pārvērt virkni tekstā"
      },
      piece3: {
        title: "3. uzdevums",
        description: "Atrodi likumsakarību simbolos un rekonstruē pareizo virkni.",
        h1: "Tur ir raksts, nevis nejaušība",
        h2: "Pievērs uzmanību simboliem"
      },
      piece4: {
        title: "4. uzdevums",
        description: "Izmanto nosaukuma norādes, lai izfiltrētu pareizās rakstzīmes.",
        h1: "Atslēga ir nosaukumā",
        h2: "Skaties uz lielajiem burtiem un cipariem"
      },
      piece5: {
        title: "5. uzdevums",
        description: "Atrodi precīzu frāzi vai nosaukumu, kas kalpo kā kods.",
        h1: "Tas ir saistīts ar tekstu vai nosaukumu",
        h2: "Precīza frāze ir svarīga"
      },
      piece6: {
        title: "6. uzdevums",
        description: "Izmanto koordinātes vai režģi, lai noteiktu pareizo vērtību.",
        h1: "Koordināte vai pozīcija",
        h2: "Divi simboli nav nejauši"
      },
      piece7: {
        title: "7. uzdevums",
        description: "Atrodi attiecīgo šūnu režģī un iegūsti no tās kodu.",
        h1: "Tas strādā līdzīgi iepriekšējam",
        h2: "Skaties uz šūnām vai režģi"
      },
      piece8: {
        title: "8. uzdevums",
        description: "Sameklē slēpto informāciju un dekodē to pareizā formā.",
        h1: "Ne viss ir redzams uzreiz",
        h2: "Iespējams, ka kaut kas jādekodē"
      },
      piece9: {
        title: "9. uzdevums",
        description: "Apvieno iepriekš iegūtos rezultātus, lai iegūtu pēdējo atslēgu.",
        h1: "Pēdējais fragments",
        h2: "Padomā par iepriekšējiem rezultātiem kopā"
      }
    };

    const codeInput = document.getElementById("codeInput");
    const unlockBtn = document.getElementById("unlockBtn");
    const clearSelectionBtn = document.getElementById("clearSelectionBtn");
    const messageEl = document.getElementById("message");
    const timerText = document.getElementById("timerText");
    const unlockedCountEl = document.getElementById("unlockedCount");
    const placedCountEl = document.getElementById("placedCount");
    const progressBar = document.getElementById("progressBar");
    const piecesTray = document.getElementById("piecesTray");
    const allPieces = [...document.querySelectorAll(".piece")];
    const slots = [...document.querySelectorAll(".slot")];

    const slotModal = document.getElementById("slotModal");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const modalImage = document.getElementById("modalImage");
    const modalPlaceholder = document.getElementById("modalPlaceholder");

    const winModal = document.getElementById("winModal");
    const finalTime = document.getElementById("finalTime");
    const closeWinBtn = document.getElementById("closeWinBtn");

    let time = 0;
    let timerInterval = null;
    let draggedPiece = null;
    let selectedPiece = null;
    let gameFinished = false;

    function formatTime(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      return [
        String(h).padStart(2, "0"),
        String(m).padStart(2, "0"),
        String(s).padStart(2, "0")
      ].join(":");
    }

    function normalizeInput(str) {
      return str.trim().replace(/\s+/g, " ");
    }

    function setMessage(text, type = "") {
      messageEl.textContent = text;
      messageEl.className = "message";
      if (type) messageEl.classList.add(type);
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        time++;
        timerText.textContent = formatTime(time);
        renderSlotHints();
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    function getCurrentHintLevel() {
      if (time >= HINT_TIMES[1]) return 2;
      if (time >= HINT_TIMES[0]) return 1;
      return 0;
    }

    function countUnlocked() {
      const unlocked = allPieces.filter(piece => !piece.classList.contains("hidden")).length;
      unlockedCountEl.textContent = `${unlocked}/9`;
    }

    function countPlaced() {
      const placed = slots.filter(slot => slot.querySelector("img")).length;
      placedCountEl.textContent = `${placed}/9`;
    }

    function updateProgress() {
      const placed = slots.filter(slot => slot.querySelector("img")).length;
      progressBar.style.width = `${(placed / 9) * 100}%`;
    }

    function clearSelection() {
      allPieces.forEach(piece => piece.classList.remove("selected"));
      selectedPiece = null;
    }

    function isSlotPlaced(slot) {
      return !!slot.querySelector("img");
    }

    function updateSlotState(slot) {
      if (isSlotPlaced(slot)) {
        slot.classList.add("filled");
      } else {
        slot.classList.remove("filled");
      }
    }

    function getHintText(pieceId, level) {
      const data = hints[pieceId];
      if (!data) return "";

      if (level === 1) return data.h1;
      if (level === 2) return data.h2;
      return "";
    }

    function renderSlotHints() {
      const hintLevel = getCurrentHintLevel();

      slots.forEach(slot => {
        const pieceId = slot.dataset.piece;
        const data = hints[pieceId];
        const content = slot.querySelector(".slot-overlay-content");

        if (!data || !content) return;
        if (isSlotPlaced(slot)) return;

        let text = data.description;

        if (hintLevel > 0) {
          text = getHintText(pieceId, hintLevel);
        }

        content.innerHTML = `
          <h4>${data.title}</h4>
          <p>${text}</p>
        `;
      });
    }

    function placePiece(piece, slot) {
      if (!piece || !slot || gameFinished) return false;
      if (slot.querySelector("img")) return false;
      if (slot.dataset.correct !== piece.id) return false;

      slot.appendChild(piece);
      updateSlotState(slot);
      clearSelection();
      countPlaced();
      updateProgress();
      renderSlotHints();
      checkWin();
      return true;
    }

    function unlockPiece(pieceId) {
      const piece = document.getElementById(pieceId);
      if (!piece) return;

      if (!piece.classList.contains("hidden")) {
        setMessage("Šis gabals jau ir atbloķēts.", "warning");
        return;
      }

      piece.classList.remove("hidden");
      piecesTray.appendChild(piece);
      countUnlocked();
      setMessage("Gabals atbloķēts.", "success");
    }

    function checkCode() {
      const input = normalizeInput(codeInput.value);

      if (!input) {
        setMessage("Ievadi kodu.", "warning");
        return;
      }

      if (Object.prototype.hasOwnProperty.call(codes, input)) {
        unlockPiece(codes[input]);
      } else {
        setMessage("Nepareizs kods.", "error");
      }

      codeInput.value = "";
      codeInput.focus();
    }

    function attachPieceEvents(piece) {
      piece.addEventListener("dragstart", () => {
        if (piece.classList.contains("hidden")) return;
        draggedPiece = piece;
      });

      piece.addEventListener("dragend", () => {
        draggedPiece = null;
        slots.forEach(slot => slot.classList.remove("drag-over"));
      });

      piece.addEventListener("click", () => {
        if (piece.classList.contains("hidden")) return;

        if (selectedPiece === piece) {
          clearSelection();
          return;
        }

        clearSelection();
        selectedPiece = piece;
        piece.classList.add("selected");
      });
    }

    function attachSlotEvents(slot) {
      slot.addEventListener("dragover", e => {
        e.preventDefault();
        slot.classList.add("drag-over");
      });

      slot.addEventListener("dragleave", () => {
        slot.classList.remove("drag-over");
      });

      slot.addEventListener("drop", e => {
        e.preventDefault();
        slot.classList.remove("drag-over");

        if (draggedPiece) {
          const ok = placePiece(draggedPiece, slot);
          if (!ok) setMessage("Šis gabals te neder.", "error");
          draggedPiece = null;
        }
      });

      slot.addEventListener("click", () => {
        if (selectedPiece) {
          const ok = placePiece(selectedPiece, slot);
          if (!ok) setMessage("Šis gabals te neder.", "error");
          return;
        }

        const placedImg = slot.querySelector("img");
        if (placedImg) {
          openSlotModal(slot);
        }
      });
    }

    function renderSlotModal(slot) {
      const placedImg = slot.querySelector("img");

      if (placedImg) {
        modalImage.src = placedImg.src;
        modalImage.style.display = "block";
        modalPlaceholder.style.display = "none";
      } else {
        modalImage.style.display = "none";
        modalPlaceholder.style.display = "block";
      }
    }

    function openSlotModal(slot) {
      renderSlotModal(slot);
      slotModal.classList.add("show");
      document.body.style.overflow = "hidden";
    }

    function closeSlotModal() {
      slotModal.classList.remove("show");
      document.body.style.overflow = "";
    }

    function checkWin() {
      const allPlaced = slots.every(slot => slot.querySelector("img"));
      if (!allPlaced) return;

      gameFinished = true;
      stopTimer();
      finalTime.textContent = formatTime(time);
      winModal.classList.add("show");
    }

    unlockBtn.addEventListener("click", checkCode);

    codeInput.addEventListener("keydown", e => {
      if (e.key === "Enter") checkCode();
    });

    clearSelectionBtn.addEventListener("click", clearSelection);

    closeModalBtn.addEventListener("click", closeSlotModal);

    slotModal.addEventListener("click", e => {
      if (e.target === slotModal) closeSlotModal();
    });

    closeWinBtn.addEventListener("click", () => {
      winModal.classList.remove("show");
    });

    document.addEventListener("keydown", e => {
      if (e.key === "Escape") {
        closeSlotModal();
        winModal.classList.remove("show");
      }
    });

    allPieces.forEach(attachPieceEvents);
    slots.forEach(slot => {
      attachSlotEvents(slot);
      updateSlotState(slot);
    });

    
    countUnlocked();
    countPlaced();
    updateProgress();
    timerText.textContent = formatTime(0);
    renderSlotHints();
    startTimer();
  </script>
</body>
</html>
